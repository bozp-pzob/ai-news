<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#059669" />
    <meta
      name="description"
      content="Digital Gardener - Community intelligence from Discord, GitHub, and Telegram. AI summaries, structured data, trending topics, and semantic search across 100+ communities."
    />
    <link rel="apple-touch-icon" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <title>Digital Gardener</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebAPI",
        "name": "Digital Gardener",
        "description": "Community intelligence platform providing structured data and AI-generated summaries from Discord, GitHub, and Telegram for 100+ communities. Pay-per-query with USDC on Solana via x402 protocol.",
        "url": "https://digitalgardener.com",
        "documentation": "https://digitalgardener.com/api/v1/openapi.json",
        "provider": {
          "@type": "Organization",
          "name": "Digital Gardener"
        },
        "termsOfService": "https://digitalgardener.com/terms",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD",
          "description": "Free tier: community discovery, trending topics, and statistics. Paid tier: AI summaries, full context, and semantic search (USDC on Solana)."
        },
        "potentialAction": [
          {
            "@type": "SearchAction",
            "target": "https://digitalgardener.com/api/v1/search?q={query}",
            "query-input": "required name=query"
          }
        ]
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
